<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-dark: #232430; --bg-darker: #1b1c27; --bg-content: #1e1f2e;
    --tab-active-bg: #243659; --text-primary: #e4e4e8; --text-secondary: #c0c0c4;
    --text-link: #509aff; --divider: rgba(255,255,255,0.10); --section-label: #6e6e7a;
    --item-hover: rgba(255,255,255,0.05); --item-active: rgba(80,154,255,0.12);
    --rail-w: 96px; --sidebar-w: 256px; --topbar-h: 52px;
  }
  html, body { height: 100%; background: var(--bg-darker); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text-primary); }

  /* ── TOP BAR ── */
  .topbar { height: var(--topbar-h); background: var(--bg-dark); border-bottom: 1px solid var(--divider); display: flex; align-items: center; padding: 0 20px; gap: 12px; position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
  .topbar-logo { display: flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
  .topbar-logo svg { width: 28px; height: 28px; }
  .topbar-badge { background: rgba(80,154,255,0.12); color: var(--text-link); font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid rgba(80,154,255,0.2); }
  .topbar-badge.direct { background: rgba(76,175,125,0.12); color: #4caf7d; border-color: rgba(76,175,125,0.25); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .topbar-right span { font-size: 13px; color: var(--text-secondary); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--tab-active-bg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text-link); }
  .test-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(80,154,255,0.35); background: rgba(80,154,255,0.08); color: var(--text-link); font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; letter-spacing: 0.2px; }
  .test-btn:hover { background: rgba(80,154,255,0.16); }
  .test-btn.active { background: var(--text-link); color: #fff; border-color: var(--text-link); }
  .test-btn svg { width: 14px; height: 14px; }
  .topbar-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; color: var(--text-secondary); transition: background 0.15s, color 0.15s; }
  .topbar-icon:hover { background: var(--item-hover); color: var(--text-primary); }
  .topbar-icon svg { width: 18px; height: 18px; }
  .topbar-divider { width: 1px; height: 20px; background: var(--divider); }

  /* ── LAYOUT ── */
  .layout { display: flex; height: calc(100vh - var(--topbar-h)); margin-top: var(--topbar-h); }

  /* ── LEFT ICON RAIL ── */
  .rail { width: var(--rail-w); background: var(--bg-dark); border-right: 1px solid var(--divider); display: flex; flex-direction: column; padding: 12px 0; gap: 4px; flex-shrink: 0; overflow-y: auto; }
  .rail-item { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; width: 100%; padding: 10px 8px; cursor: pointer; border-radius: 8px; transition: background 0.15s; border: none; background: none; color: var(--text-secondary); }
  .rail-item:hover { background: var(--item-hover); }
  .rail-item.active { color: var(--text-link); }
  .rail-item.active .rail-icon-wrap { background: var(--tab-active-bg); }
  .rail-icon-wrap { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .rail-item svg { width: 22px; height: 22px; }
  .rail-label { font-size: 11px; font-weight: 600; text-align: center; white-space: nowrap; }

  /* ── SECONDARY SIDEBAR ── */
  .sidebar-wrap { width: var(--sidebar-w); border-right: 1px solid var(--divider); flex-shrink: 0; position: relative; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar { background: var(--bg-dark); flex: 1; overflow-y: auto; padding: 0 8px 24px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  .sidebar-fade { position: absolute; bottom: 0; left: 0; right: 0; height: 48px; background: linear-gradient(to bottom, transparent, var(--bg-dark)); pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .sidebar-fade.visible { opacity: 1; }
  .sidebar-more { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--section-label); pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap; }
  .sidebar-more.visible { opacity: 1; }
  .sidebar-more svg { width: 10px; height: 10px; }
  .sidebar-header { font-size: 18px; font-weight: 500; color: var(--text-secondary); padding: 12px 16px 8px; background: var(--bg-dark); position: sticky; top: 0; z-index: 2; }

  /* ── SEARCH (less prominent) ── */
  .search-wrap { position: sticky; top: 44px; z-index: 2; background: var(--bg-dark); padding: 0 8px 8px; }
  .search-inner { position: relative; }
  .search-input { width: 100%; height: 28px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; color: var(--text-secondary); font-size: 12px; padding: 0 24px 0 27px; outline: none; transition: border-color 0.15s, background 0.15s; font-family: inherit; }
  .search-input::placeholder { color: var(--section-label); }
  .search-input:focus { border-color: rgba(80,154,255,0.3); background: rgba(80,154,255,0.04); color: var(--text-primary); }
  .search-icon { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--section-label); pointer-events: none; opacity: 0.7; }
  .search-icon svg { width: 12px; height: 12px; display: block; }
  .search-clear { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); color: var(--section-label); background: none; border: none; cursor: pointer; display: none; padding: 2px; }
  .search-clear svg { width: 11px; height: 11px; display: block; }
  .search-clear:hover { color: var(--text-secondary); }
  .search-empty { padding: 20px 16px; font-size: 13px; color: var(--section-label); text-align: center; }

  /* sidebar sections */
  .section-label { font-size: 10px; font-weight: 600; color: var(--section-label); letter-spacing: 0.8px; text-transform: uppercase; padding: 16px 16px 4px; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 0 16px; height: 36px; min-height: 36px; cursor: pointer; border-radius: 8px; font-size: 14px; font-weight: 400; color: var(--text-secondary); transition: background 0.12s, color 0.12s; border: none; background: none; width: 100%; text-align: left; flex-shrink: 0; }
  .nav-item:hover { background: var(--item-hover); color: var(--text-primary); }
  .nav-item.active { background: var(--item-active); color: var(--text-link); font-weight: 500; }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.6; }
  .nav-item.active svg { opacity: 1; }
  .nav-item mark { background: rgba(80,154,255,0.25); color: var(--text-primary); border-radius: 2px; padding: 0 1px; }

  /* ── MAIN CONTENT ── */
  .main { flex: 1; background: var(--bg-content); display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .placeholder { display: flex; flex-direction: column; align-items: center; gap: 14px; opacity: 0; transform: translateY(6px); transition: opacity 0.2s, transform 0.2s; max-width: 400px; text-align: center; padding: 24px; }
  .placeholder.visible { opacity: 1; transform: translateY(0); }
  .placeholder-icon { width: 56px; height: 56px; border-radius: 14px; background: rgba(80,154,255,0.10); display: flex; align-items: center; justify-content: center; }
  .placeholder-icon svg { width: 28px; height: 28px; color: var(--text-link); }
  .placeholder-title { font-size: 22px; font-weight: 600; color: var(--text-primary); }
  .placeholder-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .placeholder-path { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--section-label); background: rgba(255,255,255,0.04); padding: 5px 12px; border-radius: 20px; flex-wrap: wrap; justify-content: center; }
  .placeholder-path span { color: var(--text-secondary); }
  .placeholder-path .sep { color: var(--section-label); }
  .welcome { display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
  .welcome svg { width: 52px; height: 52px; opacity: 0.2; }
  .welcome-title { font-size: 20px; font-weight: 500; color: var(--text-secondary); }
  .welcome-sub { font-size: 14px; color: var(--section-label); max-width: 280px; line-height: 1.6; }

  /* ── QUESTION PANEL ── */
  .q-panel {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    width: 560px; max-width: calc(100vw - 48px);
    background: #1e2133; border: 1px solid rgba(80,154,255,0.25);
    border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    z-index: 300; display: none; flex-direction: column; overflow: hidden;
  }
  .q-panel.visible { display: flex; }
  .q-header { display: flex; align-items: center; padding: 14px 18px 10px; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .q-badge { font-size: 11px; font-weight: 700; color: var(--text-link); background: rgba(80,154,255,0.12); padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .q-progress-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .q-progress-bar { height: 100%; background: var(--text-link); border-radius: 2px; transition: width 0.3s; }
  .q-close { background: none; border: none; color: var(--section-label); cursor: pointer; padding: 2px; display: flex; }
  .q-close:hover { color: var(--text-secondary); }
  .q-close svg { width: 16px; height: 16px; }
  .q-body { padding: 16px 18px 14px; }
  .q-difficulty { font-size: 10px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 6px; }
  .q-difficulty.easy { color: #4caf7d; }
  .q-difficulty.medium { color: #f0a030; }
  .q-difficulty.hard { color: #e05252; }
  .q-text { font-size: 15px; font-weight: 500; color: var(--text-primary); line-height: 1.5; margin-bottom: 12px; }
  .q-hint { font-size: 12px; color: var(--section-label); font-style: italic; }
  .q-answer { margin-top: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; display: none; }
  .q-answer.show { display: block; }
  .q-answer.neutral { background: rgba(80,154,255,0.10); color: var(--text-link); border: 1px solid rgba(80,154,255,0.2); }
  .q-footer { display: flex; align-items: center; gap: 8px; padding: 0 18px 14px; }
  .q-btn { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; font-family: inherit; }
  .q-btn.secondary { background: rgba(255,255,255,0.07); color: var(--text-secondary); }
  .q-btn.secondary:hover { background: rgba(255,255,255,0.11); }
  .q-btn.primary { background: var(--text-link); color: #fff; }
  .q-btn.primary:hover { background: #3d87ff; }
  .q-answered-label { font-size: 12px; color: var(--section-label); margin-left: auto; }
  .q-summary { padding: 20px 18px; text-align: center; }
  .q-summary-title { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .q-summary-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }
  .q-results { text-align: left; }
  .q-result-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.06); font-size: 12px; }
  .q-result-q { color: var(--text-secondary); flex: 1; line-height: 1.4; }
  .q-result-a { color: var(--text-link); white-space: nowrap; font-weight: 500; }
  .q-result-a.skipped { color: var(--section-label); }
</style>
</head>

  const more = document.getElementById('sidebarMore');
  if (!sidebar || !fade || !more) return;
  const atBottom = sidebar.scrollTop + sidebar.clientHeight >= sidebar.scrollHeight - 8;
  const canScroll = sidebar.scrollHeight > sidebar.clientHeight + 8;
  const show = canScroll && !atBottom;
  fade.classList.toggle('visible', show);
  more.classList.toggle('visible', show);
}

// ────────────────────────────────────────────────
// SEARCH
// ────────────────────────────────────────────────
let searchQuery = '';

function buildSearchBar() {
  return `<div class="search-wrap">
    <div class="search-inner">
      <span class="search-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search…" autocomplete="off" oninput="onSearch(this.value)" />
      <button class="search-clear" id="searchClear" onclick="clearSearch()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>`;
}

function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('searchClear').style.display = searchQuery ? 'flex' : 'none';
  applySearch();
}

function clearSearch() {
  searchQuery = '';
  const inp = document.getElementById('searchInput');
  if (inp) inp.value = '';
  document.getElementById('searchClear').style.display = 'none';
  applySearch();
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
}

function applySearch() {
  if (!currentTab) return;
  const sidebar = document.getElementById('sidebar');
  const items = sidebar.querySelectorAll('.nav-item');
  const labels = sidebar.querySelectorAll('.section-label');
  let anyVisible = false;

  if (!searchQuery) {
    items.forEach(el => { el.style.display = ''; el.innerHTML = getIcon(el.dataset.item) + el.dataset.item; });
    labels.forEach(el => el.style.display = '');
    const empty = sidebar.querySelector('.search-empty');
    if (empty) empty.remove();
    setTimeout(updateScrollHint, 50);
    return;
  }

  const sectionVisible = {};
  items.forEach(el => {
    const name = el.dataset.item;
    const match = name.toLowerCase().includes(searchQuery);
    el.style.display = match ? '' : 'none';
    if (match) { sectionVisible[el.dataset.section] = true; anyVisible = true; el.innerHTML = getIcon(name) + highlight(name, searchQuery); }
  });

  labels.forEach(el => {
    const sectionName = el.dataset.section;
    el.style.display = sectionVisible[sectionName] ? '' : 'none';
  });

  let empty = sidebar.querySelector('.search-empty');
  if (!anyVisible) {
    if (!empty) { empty = document.createElement('div'); empty.className = 'search-empty'; sidebar.appendChild(empty); }
    empty.textContent = `No results for "${searchQuery}"`;
  } else if (empty) { empty.remove(); }

  setTimeout(updateScrollHint, 50);
}

// ────────────────────────────────────────────────
// SIDEBAR RENDER
// ────────────────────────────────────────────────
function renderSidebar(tabKey) {
  const tab = NAV[tabKey];
  const sidebar = document.getElementById('sidebar');
  let html = `<div class="sidebar-header">${tab.label}</div>`;
  html += buildSearchBar();
  tab.sections.forEach(section => {
    if (section.title) html += `<div class="section-label" data-section="${section.title}">${section.title}</div>`;
    section.items.forEach(item => {
      html += `<button class="nav-item" data-tab="${tabKey}" data-item="${item}" data-section="${section.title||''}">${getIcon(item)}${item}</button>`;
    });
  });
  sidebar.innerHTML = html;

  sidebar.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => selectItem(btn.dataset.tab, btn.dataset.item, btn.dataset.section));
  });
  sidebar.removeEventListener('scroll', updateScrollHint);
  sidebar.addEventListener('scroll', updateScrollHint);
  searchQuery = '';
  setTimeout(updateScrollHint, 50);
}

// ────────────────────────────────────────────────
// TAB / ITEM SELECTION
// ────────────────────────────────────────────────
function selectTab(tabKey) {
  if (currentTab === tabKey) return;
  currentTab = tabKey;
  currentItem = null;
  document.querySelectorAll('.rail-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tabKey));
  renderSidebar(tabKey);
  if (!testMode) showWelcome();
  else showTestPrompt();
}

function selectItem(tabKey, itemName, sectionTitle) {
  currentItem = itemName;
  clearSearch();
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.tab === tabKey && el.dataset.item === itemName && el.dataset.section === sectionTitle)
  );
  showPlaceholder(tabKey, itemName, sectionTitle);
  if (testMode && !qAnswered) {
    qAnswers[qIndex] = { tab: tabKey, item: itemName, section: sectionTitle };
    qAnswered = true;
    renderQuestion();
  }
}

function showWelcome() {
  document.getElementById('main').innerHTML = `<div class="welcome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    <div class="welcome-title">Select a screen</div>
    <div class="welcome-sub">Click any item in the sidebar to navigate to it.</div>
  </div>`;
  setTimeout(updateScrollHint, 60);
}

function showPlaceholder(tabKey, itemName, sectionTitle) {
  const tab = NAV[tabKey];
  const desc = getScreenDesc(tabKey, sectionTitle, itemName);
  const breadcrumb = sectionTitle
    ? `${tab.label} <span class="sep">›</span> <span>${sectionTitle}</span> <span class="sep">›</span> <span>${itemName}</span>`
    : `${tab.label} <span class="sep">›</span> <span>${itemName}</span>`;
  document.getElementById('main').innerHTML = `
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">${tab.icon}</div>
      <div class="placeholder-title">${itemName}</div>
      ${desc ? `<div class="placeholder-desc">${desc}</div>` : ''}
      <div class="placeholder-path">${breadcrumb}</div>
    </div>`;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const el = document.getElementById('placeholder');
    if (el) el.classList.add('visible');
  }));
}

// ────────────────────────────────────────────────
// TEST MODE
// ────────────────────────────────────────────────
function toggleTest() {
  testMode = !testMode;
  const btn = document.getElementById('testBtn');
  btn.classList.toggle('active', testMode);
  btn.innerHTML = testMode
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> End Test`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Navigation Test`;

  if (testMode) {
    qIndex = 0; qAnswers = []; qAnswered = false;
    const panel = document.getElementById('qPanel');
    panel.classList.add('visible');
    renderQuestion();
    showTestPrompt();
  } else {
    document.getElementById('qPanel').classList.remove('visible');
    showWelcome();
  }
}

function showTestPrompt() {
  if (!testMode || qAnswered) return;
  document.getElementById('main').innerHTML = `<div class="welcome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <div class="welcome-title">Navigate to your answer</div>
    <div class="welcome-sub">Read the question below, then click the item in the sidebar where you'd expect to find it.</div>
  </div>`;
}

function renderQuestion() {
  const panel = document.getElementById('qContent');
  if (qIndex >= QUESTIONS.length) { renderSummary(); return; }
  const q = QUESTIONS[qIndex];
  const ans = qAnswers[qIndex];
  const pct = Math.round((qIndex / QUESTIONS.length) * 100);
  const diffLabel = { easy:'Easy', medium:'Medium', hard:'Hard' }[q.difficulty];
  panel.innerHTML = `
    <div class="q-header">
      <div class="q-badge">Q${qIndex+1} / ${QUESTIONS.length}</div>
      <div class="q-progress-wrap"><div class="q-progress-bar" style="width:${pct}%"></div></div>
      <button class="q-close" onclick="toggleTest()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="q-body">
      <div class="q-difficulty ${q.difficulty}">${diffLabel}</div>
      <div class="q-text">${q.text}</div>
      ${q.hint ? `<div class="q-hint">💡 ${q.hint}</div>` : ''}
      ${ans ? `<div class="q-answer neutral show">You navigated to: <strong>${NAV[ans.tab].label} ${ans.section ? '› ' + ans.section + ' ' : ''}› ${ans.item}</strong></div>` : ''}
    </div>
    <div class="q-footer">
      ${qIndex > 0 ? `<button class="q-btn secondary" onclick="prevQ()">← Back</button>` : ''}
      <button class="q-btn secondary" onclick="skipQ()">Skip</button>
      ${ans ? `<button class="q-btn primary" onclick="nextQ()">Next question →</button>` : ''}
      <span class="q-answered-label">${qAnswers.filter(Boolean).length} answered</span>
    </div>`;
}

function nextQ() {
  qIndex++;
  qAnswered = !!qAnswers[qIndex];
  if (qIndex >= QUESTIONS.length) { renderSummary(); return; }
  renderQuestion();
  if (!qAnswered) showTestPrompt();
}

function prevQ() {
  if (qIndex > 0) { qIndex--; qAnswered = !!qAnswers[qIndex]; renderQuestion(); if (!qAnswered) showTestPrompt(); }
}

function skipQ() {
  if (!qAnswers[qIndex]) qAnswers[qIndex] = null;
  nextQ();
}

function renderSummary() {
  const answered = qAnswers.filter(a => a !== null && a !== undefined).length;
  document.getElementById('qContent').innerHTML = `
    <div class="q-header">
      <div class="q-badge">Done!</div>
      <div class="q-progress-wrap"><div class="q-progress-bar" style="width:100%"></div></div>
      <button class="q-close" onclick="toggleTest()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="q-summary">
      <div class="q-summary-title">Test complete ✓</div>
      <div class="q-summary-sub">You answered ${answered} of ${QUESTIONS.length} questions. Here's a summary of where you navigated:</div>
      <div class="q-results">
        ${QUESTIONS.map((q,i) => {
          const a = qAnswers[i];
          const aLabel = a ? `${NAV[a.tab].label}${a.section?' › '+a.section:''} › ${a.item}` : '—';
          return `<div class="q-result-row">
            <div class="q-result-q">Q${i+1}. ${q.text.slice(0,70)}…</div>
            <div class="q-result-a ${a?'':'skipped'}">${aLabel}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  document.getElementById('main').innerHTML = `<div class="welcome">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <div class="welcome-title">Test complete!</div>
    <div class="welcome-sub">Thank you. Review your answers in the panel below.</div>
  </div>`;
}

// ────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────
document.querySelectorAll('.rail-item').forEach(btn => {
  btn.addEventListener('click', () => selectTab(btn.dataset.tab));
});
selectTab('dashboard');
</script>
</body>
</html>
